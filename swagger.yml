openapi: 3.0.3
info:
  title: Systeme de Pointage API
  description: Documentation des endpoints disponibles pour l'authentification, le pointage, le pilotage des cours et la gestion academique.
  version: 1.1.0
servers:
  - url: http://127.0.0.1:5000
    description: Serveur local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    kioskKeyAuth:
      type: apiKey
      in: header
      name: X-Attendance-Kiosk-Key
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: etudiant@test.com
        password:
          type: string
          example: Password123!
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        role:
          type: string
        user_id:
          type: integer
        must_change_password:
          type: boolean
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          example: etudiant@test.com
    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
          description: Token recu par email, extrait du lien de reinitialisation.
        new_password:
          type: string
          minLength: 8
    StudentCreateRequest:
      type: object
      required: [nom, prenom, email, promotion_id]
      properties:
        nom:
          type: string
        prenom:
          type: string
        email:
          type: string
        promotion_id:
          type: integer
        photo:
          type: string
          format: binary
          description: >-
            Optionnel a la creation. Sans photo, l'etudiant ne pourra pas utiliser
            le pointage par reconnaissance faciale tant qu'une photo n'aura pas ete
            ajoutee via PATCH (le pointage par QR code reste utilisable).
    ProfessorCreateRequest:
      type: object
      required: [nom, prenom, email]
      properties:
        nom:
          type: string
        prenom:
          type: string
        email:
          type: string
        matiere_ids:
          type: string
          description: >-
            Optionnel. Ids de matieres enseignees : liste JSON, ou en
            multipart/form-data une chaine separee par des virgules (ex. "1,2,3").
            Modifiable ensuite via PATCH.
        promotion_ids:
          type: string
          description: Optionnel. Meme format que matiere_ids, pour les promotions en charge.
        photo:
          type: string
          format: binary
          description: Optionnel a la creation, modifiable ensuite via PATCH.
    UserUpdateRequest:
      type: object
      properties:
        nom:
          type: string
        prenom:
          type: string
        email:
          type: string
        statut:
          type: string
        promotion_id:
          type: integer
        matiere_ids:
          type: string
          description: >-
            Professeur uniquement. Remplace l'ensemble des matieres enseignees
            (liste JSON ou chaine separee par des virgules).
        promotion_ids:
          type: string
          description: Professeur uniquement. Remplace l'ensemble des promotions en charge.
        photo:
          type: string
          format: binary
    ExcelImportRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
    CheckinRequest:
      type: object
      required: [course_id, selfie]
      properties:
        course_id:
          type: integer
        selfie:
          type: string
          format: binary
        gps_lat:
          type: number
        gps_lng:
          type: number
        timestamp:
          type: string
          format: date-time
    KioskScanRequest:
      type: object
      required: [selfie]
      properties:
        selfie:
          type: string
          format: binary
        timestamp:
          type: string
          format: date-time
    KioskCheckinRequest:
      type: object
      required: [student_id, course_id, selfie]
      properties:
        student_id:
          type: integer
        course_id:
          type: integer
        selfie:
          type: string
          format: binary
        gps_lat:
          type: number
        gps_lng:
          type: number
        timestamp:
          type: string
          format: date-time
    CourseCreateRequest:
      type: object
      required: [matiere_id, professeur_id, salle_id, promotion_id, date, heure_debut, heure_fin]
      properties:
        matiere_id:
          type: integer
        professeur_id:
          type: integer
        salle_id:
          type: integer
        promotion_id:
          type: integer
        date:
          type: string
          example: 2026-07-10
        heure_debut:
          type: string
          example: 09:00:00
        heure_fin:
          type: string
          example: 11:00:00
        tolerance_retard_minutes:
          type: integer
        statut:
          type: string
        motif_changement:
          type: string
    CourseCancelRequest:
      type: object
      required: [motif]
      properties:
        motif:
          type: string
    CourseRescheduleRequest:
      type: object
      required: [date, heure_debut, heure_fin]
      properties:
        date:
          type: string
          example: "2026-07-12"
          description: "Champ canonique. Alias accepte: new_date"
        heure_debut:
          type: string
          example: "15:00:00"
          description: "Champ canonique. Alias accepte: new_start_time"
        heure_fin:
          type: string
          example: "17:00:00"
          description: "Champ canonique. Alias accepte: new_end_time"
        motif:
          type: string
          description: "Champ canonique. Alias accepte: reason"
        salle_id:
          type: integer
          description: "Champ canonique. Alias accepte: room_id"
        new_date:
          type: string
        new_start_time:
          type: string
        new_end_time:
          type: string
        reason:
          type: string
        room_id:
          type: integer
    AttendanceRegularizeRequest:
      type: object
      required: [etudiant_id, statut]
      properties:
        etudiant_id:
          type: integer
          description: "Champ canonique. Alias accepte: student_id"
        statut:
          type: string
          enum: [present, retard, absent, absence_justifiee]
          description: "Champ canonique. Alias accepte: status"
        justificatif:
          type: string
          description: "Champ canonique. Alias accepte: reason"
        pointage_time:
          type: string
          format: date-time
          description: "Horodatage manuel optionnel. Alias accepte: attendance_time"
        student_id:
          type: integer
        status:
          type: string
          enum: [present, retard, absent, absence_justifiee]
        reason:
          type: string
        attendance_time:
          type: string
          format: date-time
    AbsenceJustifyRequest:
      type: object
      properties:
        reason:
          type: string
        document_url:
          type: string
        status:
          type: string
    SubjectRequest:
      type: object
      properties:
        nom:
          type: string
        code:
          type: string
        credits:
          type: integer
    RoomRequest:
      type: object
      properties:
        nom:
          type: string
        batiment:
          type: string
    FiliereRequest:
      type: object
      properties:
        nom:
          type: string
    PromotionRequest:
      type: object
      properties:
        niveau:
          type: string
        annee_academique:
          type: string
        filiere_id:
          type: integer
    SettingsResponse:
      type: object
      properties:
        id:
          type: integer
        nom_etablissement:
          type: string
        seuil_absences:
          type: integer
          description: Nombre d'absences non justifiees a partir duquel seuil_atteint passe a true.
        tolerance_retard_minutes_defaut:
          type: integer
          description: Tolerance de retard (minutes) appliquee par defaut a la creation d'un cours si non precisee.
        contact_support_email:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time
    SettingsUpdateRequest:
      type: object
      description: Tous les champs sont optionnels ; seuls les champs presents sont modifies.
      properties:
        nom_etablissement:
          type: string
        seuil_absences:
          type: integer
          minimum: 1
        tolerance_retard_minutes_defaut:
          type: integer
          minimum: 0
        contact_support_email:
          type: string
    ReportTemplate:
      type: object
      properties:
        id:
          type: string
          example: absences_summary
        name:
          type: string
        description:
          type: string
        formats:
          type: array
          items:
            type: string
            enum: [csv, xlsx]
        parameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              required:
                type: boolean
    GenerateReportRequest:
      type: object
      required: [template_id]
      properties:
        template_id:
          type: string
          enum: [absences_summary, course_attendance]
        format:
          type: string
          enum: [csv, xlsx]
          default: csv
        promotion_id:
          type: integer
          description: Optionnel, filtre le template absences_summary.
        cours_id:
          type: integer
          description: Requis pour le template course_attendance.

paths:
  /:
    get:
      tags: [Accueil]
      summary: Redirige vers Swagger UI
      responses:
        '302':
          description: Redirection

  /api/v1/attendance/kiosk/scan:
    post:
      tags: [Pointage Borne]
      summary: Identifier un etudiant par visage depuis une borne securisee
      description: >-
        Flux nominal de pointage (voir Etudiant > POST /etudiant/attendance/checkin,
        deprecie). Un unique JWT staff (professeur/responsable/admin), ou la cle de
        borne, suffit pour enchainer des scans successifs pour des etudiants
        differents sans reconnexion : aucune limitation de frequence n'est appliquee
        cote backend. attendance_context.can_checkin_now retombe a false et
        attendance_context.already_checked_in passe a true des que l'etudiant a deja
        un pointage present/retard sur le cours actif, pour eviter un double scan.
      security:
        - bearerAuth: []
        - kioskKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/KioskScanRequest'
      responses:
        '200':
          description: Profil et emploi du temps du jour retournes
        '400':
          description: Requete invalide ou visage non vivant
        '401':
          description: Authentification staff ou cle de borne invalide
        '404':
          description: Aucun etudiant reconnu
        '503':
          description: Borne ou service facial indisponible

  /api/v1/attendance/kiosk/checkin:
    post:
      tags: [Pointage Borne]
      summary: Enregistrer un pointage depuis une borne securisee hors espace etudiant
      security:
        - bearerAuth: []
        - kioskKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/KioskCheckinRequest'
      responses:
        '200':
          description: Pointage invalide enregistre
        '201':
          description: Pointage valide enregistre
        '400':
          description: Requete invalide
        '401':
          description: Authentification staff ou cle de borne invalide
        '403':
          description: Etudiant non autorise pour ce cours ou staff sans droit
        '409':
          description: Pointage deja enregistre
        '503':
          description: Borne ou service facial indisponible

  /api/v1/auth/login:
    post:
      tags: [Authentification]
      summary: Connecter un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion reussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Requete invalide
        '401':
          description: Identifiants invalides
        '403':
          description: Compte desactive

  /api/v1/auth/me:
    get:
      tags: [Authentification]
      summary: Recuperer le profil connecte
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil retourne
        '401':
          description: Non autorise

  /api/v1/auth/change-password:
    post:
      tags: [Authentification]
      summary: Changer le mot de passe apres premiere connexion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Mot de passe mis a jour
        '400':
          description: Requete invalide
        '401':
          description: Mot de passe actuel incorrect

  /api/v1/auth/forgot-password:
    post:
      tags: [Authentification]
      summary: Demander un lien de reinitialisation de mot de passe (etudiant, professeur, responsable, admin)
      description: >-
        Disponible pour les 4 roles (tous stockes dans la meme table Utilisateur).
        Reponse volontairement identique (200, message generique) que l'email
        corresponde ou non a un compte, et meme si le compte est desactive, pour ne
        pas permettre l'enumeration d'adresses email enregistrees. Si un compte actif
        existe, un email est envoye avec un lien vers FRONTEND_PASSWORD_RESET_URL
        contenant un token signe valable 30 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reponse generique (email envoye si le compte existe et est actif)
        '400':
          description: Email manquant

  /api/v1/auth/reset-password:
    post:
      tags: [Authentification]
      summary: Choisir un nouveau mot de passe a partir du token recu par email
      description: >-
        Le token est a usage unique : il embarque une empreinte du hash du mot de
        passe courant, donc toute reutilisation (ou tout changement de mot de passe
        entre-temps par un autre canal) invalide automatiquement les tokens deja
        emis, sans necessiter de table de revocation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Mot de passe reinitialise avec succes
        '400':
          description: token_invalide, token_expire, token_deja_utilise ou mot de passe trop court
        '403':
          description: Compte desactive

  /api/v1/etudiant/courses:
    get:
      tags: [Etudiant]
      summary: Lister les cours de la promotion de l'etudiant
      security:
        - bearerAuth: []
      parameters:
        - name: statut
          in: query
          schema:
            type: string
        - name: periode
          in: query
          schema:
            type: string
            enum: [upcoming, past]
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Liste des cours

  /api/v1/etudiant/attendance/checkin:
    post:
      tags: [Etudiant]
      summary: Pointer sa presence par reconnaissance faciale
      deprecated: true
      description: >-
        Deprecie (decision securite) : un etudiant connecte sur son propre appareil
        pourrait importer une ancienne photo au lieu de se scanner en direct. Le
        pointage nominal se fait desormais exclusivement via la borne securisee
        (POST /attendance/kiosk/scan puis POST /attendance/kiosk/checkin). Cette route
        reste fonctionnelle pour d'eventuelles integrations futures et renvoie
        l'en-tete Deprecation: true.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CheckinRequest'
      responses:
        '200':
          description: Pointage invalide enregistre
        '201':
          description: Pointage valide enregistre
        '400':
          description: Requete invalide
        '409':
          description: Pointage deja enregistre
        '503':
          description: Service de reconnaissance faciale indisponible ou non configure

  /api/v1/etudiant/attendance/checkin-qr:
    post:
      tags: [Etudiant]
      summary: Pointer sa presence en scannant le QR affiche en salle
      description: >-
        Methode alternative a la reconnaissance faciale : l'etudiant scanne, depuis son
        propre telephone connecte a son compte, le QR de cours affiche par la borne/le
        professeur (GET /professeur/courses/{cours_id}/qr). Le token embarque le cours_id
        et expire 120 secondes apres generation. Aucun selfie requis ici : la preuve
        d'identite vient du JWT etudiant, la preuve de presence vient a la fois de la
        fraicheur du QR et du reseau. Comme les endpoints /attendance/kiosk/*, cette
        route est restreinte au reseau Wi-Fi dedie de l'etablissement
        (KIOSK_ALLOWED_NETWORKS) : l'etudiant doit y etre connecte, une connexion en
        donnees mobiles est refusee meme avec un JWT valide et un QR non expire.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                gps_lat:
                  type: number
                gps_lng:
                  type: number
      responses:
        '200':
          description: Pointage enregistre (retard)
        '201':
          description: Pointage enregistre (present)
        '400':
          description: Requete invalide, QR invalide/expire, ou hors delai
        '403':
          description: >-
            Etudiant hors de la promotion du cours, ou requete hors du reseau Wi-Fi
            dedie (kiosk_network_forbidden)
        '404':
          description: Cours ou etudiant introuvable
        '409':
          description: Pointage deja enregistre

  /api/v1/etudiant/attendance/history:
    get:
      tags: [Etudiant]
      summary: Consulter l'historique des pointages
      security:
        - bearerAuth: []
      parameters:
        - name: statut
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Historique retourne

  /api/v1/etudiant/courses/{cours_id}/attendance/history:
    get:
      tags: [Etudiant]
      summary: Consulter l historique des pointages de l etudiant pour un cours donne
      security:
        - bearerAuth: []
      parameters:
        - name: cours_id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Historique du cours retourne
        '403':
          description: Cours hors promotion de l etudiant

  /api/v1/etudiant/absences/summary:
    get:
      tags: [Etudiant]
      summary: Consulter le suivi des absences
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Synthese du suivi des absences

  /api/v1/etudiant/notifications:
    get:
      tags: [Etudiant]
      summary: Lister les notifications de l'etudiant
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Notifications retournees

  /api/v1/etudiant/notifications/{notification_id}/read:
    patch:
      tags: [Etudiant]
      summary: Marquer une notification comme lue
      security:
        - bearerAuth: []
      parameters:
        - name: notification_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Notification mise a jour
        '404':
          description: Notification introuvable

  /api/v1/professeur/courses:
    get:
      tags: [Professeur]
      summary: Lister les cours accessibles
      security:
        - bearerAuth: []
      parameters:
        - name: statut
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Liste des cours

  /api/v1/professeur/courses/{cours_id}:
    get:
      tags: [Professeur]
      summary: Consulter le detail d'un cours
      security:
        - bearerAuth: []
      parameters:
        - name: cours_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detail du cours
        '403':
          description: Acces refuse

  /api/v1/professeur/courses/{cours_id}/qr:
    get:
      tags: [Professeur]
      summary: Generer le QR d'un cours
      security:
        - bearerAuth: []
      parameters:
        - name: cours_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: QR genere
        '403':
          description: Acces refuse

  /api/v1/professeur/courses/{cours_id}/attendance:
    get:
      tags: [Professeur]
      summary: Voir la feuille de presence d'un cours
      security:
        - bearerAuth: []
      parameters:
        - name: cours_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Etat de presence retourne

  /api/v1/professeur/courses/{cours_id}/attendance/stream:
    get:
      tags: [Professeur]
      summary: Suivre la feuille de presence d'un cours en temps reel (Server-Sent Events)
      description: >-
        Alternative push au polling de GET .../attendance. Reponse
        text/event-stream : un premier evenement `data:` est envoye immediatement
        avec le payload courant (identique a GET .../attendance), puis un nouvel
        evenement des qu'un pointage est enregistre (borne, self-service deprecie)
        ou regularise sur ce cours. Un commentaire `: keep-alive` est envoye toutes
        les 15s en l'absence d'evenement, et la connexion se ferme au bout de 30
        minutes (le navigateur EventSource se reconnecte automatiquement). Limitation
        connue : la diffusion se fait en memoire, par process ; en deploiement
        multi-worker, seuls les abonnes connectes au meme worker que le pointage
        recoivent l'evenement (voir app/services/attendance_events.py).
      security:
        - bearerAuth: []
      parameters:
        - name: cours_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Flux text/event-stream ouvert
          content:
            text/event-stream:
              schema:
                type: string
        '403':
          description: Cours d'un autre professeur

  /api/v1/professeur/courses/{cours_id}/cancel:
    post:
      tags: [Professeur]
      summary: Annuler un cours
      security:
        - bearerAuth: []
      parameters:
        - name: cours_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCancelRequest'
      responses:
        '200':
          description: Cours annule

  /api/v1/professeur/courses/{cours_id}/reschedule:
    post:
      tags: [Professeur]
      summary: Reporter un cours
      security:
        - bearerAuth: []
      parameters:
        - name: cours_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
