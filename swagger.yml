    post:
      tags: [Pilotage]
      summary: Creer un cours
      description: >-
        Le professeur doit etre prealablement rattache a la matiere (via
        matiere_ids sur son profil) et a la promotion (via promotion_ids) du cours,
        sinon la creation est refusee en 400. La creation est egalement refusee en
