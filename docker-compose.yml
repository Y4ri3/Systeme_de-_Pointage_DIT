services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    environment:
      FLASK_CONFIG: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ARSA_FACE_API_KEY: ${ARSA_FACE_API_KEY}
      ARSA_FACE_BASE_URL: ${ARSA_FACE_BASE_URL}
      ARSA_FACE_MATCH_THRESHOLD: ${ARSA_FACE_MATCH_THRESHOLD}
      ARSA_FACE_LIVENESS_THRESHOLD: ${ARSA_FACE_LIVENESS_THRESHOLD}
      ARSA_FACE_TIMEOUT_SECONDS: ${ARSA_FACE_TIMEOUT_SECONDS}
      ATTENDANCE_KIOSK_API_KEY: ${ATTENDANCE_KIOSK_API_KEY}
      KIOSK_ALLOWED_NETWORKS: ${KIOSK_ALLOWED_NETWORKS}
      TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRONTEND_PASSWORD_RESET_URL: ${FRONTEND_PASSWORD_RESET_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "${WEB_PORT:-5000}:5000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
